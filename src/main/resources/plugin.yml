name: DifficultyEngine
version: 1.0
main: com.yourname.difficulty.Main
api-version: 1.21
description: Per-player difficulty scaling with Peaceful, Easy, Medium, Hard, and Nightmare modes. Includes a full RuneScape-style skill system.
author: yourname

commands:
  difficulty:
    description: View or change your personal difficulty level.
    usage: /difficulty [peaceful|easy|medium|hard|nightmare]
    aliases: [diff, setdifficulty]
    permission: difficultyengine.use
    permission-message: You do not have permission to use this command.

  hpbar:
    description: Toggle the live HP display (❤ current / max) above mob heads when you hit them.
    usage: /hpbar
    aliases: [showhp, healthbar, hpdisplay]
    permission: difficultyengine.use
    permission-message: You do not have permission to use this command.

  gear:
    description: Give yourself or another player max-enchanted netherite god gear (includes 10x speed boots).
    usage: /gear [player]
    aliases: [godgear, ng]
    permission: difficultyengine.gear
    permission-message: §cThis command is for admins only.

  sit:
    description: Toggle right-click-to-sit on slabs and stairs. Sneak to stand up.
    usage: /sit [on|off]
    aliases: [sitting]
    permission: difficultyengine.use
    permission-message: You do not have permission to use this command.

  registry:
    description: Open the Item Registry GUI to browse and receive all custom DifficultyEngine items.
    usage: /registry
    aliases: [itemregistry, items]
    permission: difficultyengine.registry
    permission-message: §cThis command is for admins only.

  curecosmetic:
    description: Remove all cosmetic effects (blindness, nausea, darkness, etc.) from yourself or a player.
    usage: /curecosmetic [player]
    aliases: [cureblind, cureffect, cleansight]
    permission: difficultyengine.curecosmetic
    permission-message: §cThis command is for admins only.

  adminlight:
    description: Toggle permanent personal Night Vision so you can see in the dark (admin only).
    usage: /adminlight [on|off]
    aliases: [alight, nightvision, nv]
    permission: difficultyengine.adminlight
    permission-message: §cThis command is for admins only.

  skills:
    description: View your skill levels and XP in chat.
    usage: /skills [player]
    aliases: [skill, xp, checkskills]
    permission: difficultyengine.use
    permission-message: You do not have permission to use this command.

  mystats:
    description: Open the RuneScape-style skill tree GUI showing all your skill levels.
    usage: /mystats [player]
    aliases: [skilltree]
    permission: difficultyengine.use
    permission-message: You do not have permission to use this command.

  stats:
    description: Open the RuneScape-style skill tree GUI (alias for /mystats).
    usage: /stats [player]
    permission: difficultyengine.use
    permission-message: You do not have permission to use this command.

  cape:
    description: Open the Cape Wardrobe GUI to equip or unequip your skill cape.
    usage: /cape
    aliases: [wardrobe, mycape, equipcape]
    permission: difficultyengine.use
    permission-message: You do not have permission to use this command.

  gold:
    description: Check your current gold balance.
    usage: /gold
    aliases: [balance, bal, gp]
    permission: difficultyengine.use
    permission-message: You do not have permission to use this command.

  questbook:
    description: Open the Quest Book to view and claim quest rewards.
    usage: /questbook
    aliases: [quests, quest]
    permission: difficultyengine.use
    permission-message: You do not have permission to use this command.

  party:
    description: Manage your party. Use the Party Stone to invite nearby players.
    usage: /party <accept|leave|list>
    aliases: [p]
    permission: difficultyengine.use
    permission-message: You do not have permission to use this command.

  trade:
    description: Accept a trade request sent by another player via the Trade Stone.
    usage: /trade accept
    aliases: [tr]
    permission: difficultyengine.use
    permission-message: You do not have permission to use this command.

permissions:
  difficultyengine.use:
    description: Allows players to set difficulty, use /hpbar, /sit, /registry, /skills, and /mystats.
    default: true

  difficultyengine.gear:
    description: Allows use of /gear on yourself.
    default: op

  difficultyengine.gear.others:
    description: Allows use of /gear on other players.
    default: op

  difficultyengine.registry:
    description: Allows use of /registry (Item Registry GUI). Admin-only.
    default: op

  difficultyengine.turbocart:
    description: Allows obtaining the Turbo Minecart from the Item Registry (VIP/Admin perk).
    default: op

  difficultyengine.curecosmetic:
    description: Allows use of /curecosmetic on yourself.
    default: op

  difficultyengine.curecosmetic.others:
    description: Allows use of /curecosmetic on other players.
    default: op

  difficultyengine.adminlight:
    description: Allows use of /adminlight to toggle personal Night Vision. Admin-only.
    default: op

  difficultyengine.skills.others:
    description: Allows viewing another player's skill levels via /skills <player> or /mystats <player>.
    default: op

  difficultyengine.cape.admin:
    description: Allows obtaining skill capes from /registry and grants instant Level 99 when equipping a cape.
    default: op

  difficultyengine.itemlevel.bypass:
    description: Bypasses all item level requirements (weapons, seeds, fishing rods). Admin/OP only.
    default: op

  difficultyengine.protection.bypass:
    description: Bypasses the level-difference PvP protection system (can attack/be attacked regardless of combat level gap).
    default: op
