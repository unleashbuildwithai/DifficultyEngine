name: DifficultyEngine
version: 1.0
main: com.yourname.difficulty.Main
api-version: 1.21
description: Per-player difficulty scaling with Peaceful, Easy, Medium, Hard, and Nightmare modes.
author: yourname

commands:
  difficulty:
    description: View or change your personal difficulty level.
    usage: /difficulty [peaceful|easy|medium|hard|nightmare]
    aliases: [diff, setdifficulty]

  hpbar:
    description: Toggle the live HP display above mob heads.
    usage: /hpbar

  gear:
    description: Give yourself max-enchanted netherite god gear (Admin).
    usage: /gear [player]

  sit:
    description: Toggle right-click-to-sit on slabs and stairs.
    usage: /sit [on|off]

  registry:
    description: Open the Item Registry GUI.
    usage: /registry

  curecosmetic:
    description: Remove cosmetic effects from a player (Admin).
    usage: /curecosmetic [player]

  adminlight:
    description: Toggle personal admin light (Admin).
    usage: /adminlight

  skills:
    description: View your skill levels.
    usage: /skills [player]

  mystats:
    description: Open your personal stats GUI.
    usage: /mystats

  stats:
    description: Open your personal stats GUI.
    usage: /stats

  cape:
    description: Open the Cape Wardrobe.
    usage: /cape

  mycape:
    description: Open the Cape Wardrobe.
    usage: /mycape

  gold:
    description: Check your gold coin balance.
    usage: /gold

  questbook:
    description: Open your quest journal.
    usage: /questbook

  party:
    description: Manage your adventuring party.
    usage: /party [invite|leave|kick|info]

  trade:
    description: Open a player trade session.
    usage: /trade [player]

  spellbook:
    description: Open your Arcane Tome (learned spell combos).
    usage: /spellbook

  spellpage:
    description: Give a Spell Page to yourself or a player (Admin).
    usage: /spellpage [player]

  vipshop:
    description: Open the VIP Shop or spawn the VIP keeper (Admin).
    usage: /vipshop [spawn]

  magicbag:
    description: Open your Magic Bag (4-section magic item storage).
    usage: /magicbag
    aliases: [bag, mbag]

  givebag:
    description: Give the Magic Bag item to yourself or a player (Admin).
    usage: /givebag [player]

  skilllvl:
    description: Manually set, add, or reset skill levels for a player (Admin).
    usage: /skilllvl <player> <skill|all> <set|add|reset> [value]
    aliases: [setskill, adminskill]

  questnpc:
    description: Manage quest NPC villagers in the world (Admin).
    usage: /questnpc <spawn|remove|list|info> [id]
    aliases: [qnpc]

  inventory:
    description: Open your Gold Vault (separate gold coin storage).
    usage: /inventory
    aliases: [vault, goldvault]

  commands:
    description: Show the welcome message and command list again.
    usage: /commands
    aliases: [help, ?]

  spawnmob:
    description: Spawn a custom monster at your location (Admin).
    usage: /spawnmob <monster_id>
    aliases: [custommob, cmob]

  hardcore:
    description: Activate Nightmare Hardcore mode (level/gold reset on death).
    usage: /hardcore
    aliases: [nmhc, hardcoremode]

  spawnboss:
    description: Spawn a dungeon boss at its arena location (Admin).
    usage: /spawnboss <tempest|crimson>
    aliases: [bossspawn, dungeonboss]

permissions:
  difficultyengine.use:
    description: Allows use of standard player commands.
    default: true

  difficultyengine.gear:
    description: Allows use of /gear on yourself.
    default: op

  difficultyengine.gear.others:
    description: Allows use of /gear on other players.
    default: op

  difficultyengine.registry:
    description: Allows use of /registry.
    default: op

  difficultyengine.turbocart:
    description: Allows obtaining the Turbo Minecart from the Item Registry.
    default: op

  difficultyengine.cape.admin:
    description: Bypasses cape level requirements and unlocks admin perks.
    default: op
